name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # 1. BACKEND DEPLOY
  # ─────────────────────────────────────────
  deploy-backend:
    name: 🚀 Backend Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write backend .env
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            mkdir -p /var/www/digitalWeb/backend
            cat > /var/www/digitalWeb/backend/.env << 'ENVEOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=7d
            PORT=3000
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
            ENVEOF
            echo "✅ .env fayl yozildi"

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e

            # Repo mavjud bo'lmasa clone qiladi, bo'lsa pull qiladi
            if [ ! -d "/var/www/digitalWeb/.git" ]; then
              git clone https://github.com/sunnatill0raimov/digitalWeb.git /var/www/digitalWeb
            fi

            cd /var/www/digitalWeb
            git pull origin main

            # Backend dependencies
            cd backend
            npm ci --omit=dev

            # .env faylni tekshirish
            if [ ! -f ".env" ]; then
              echo "❌ .env fayl topilmadi!" && exit 1
            fi
            echo "✅ .env fayl mavjud: $(wc -l < .env) qator"

            # PM2 restart (app nomi: crm-backend)
            pm2 restart crm-backend || pm2 start src/server.js --name crm-backend
            pm2 save

            echo "✅ Backend deploy tugadi"

  # ─────────────────────────────────────────
  # 2. FRONTEND BUILD + DEPLOY
  # ─────────────────────────────────────────
  deploy-frontend:
    name: 🎨 Frontend Deploy
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Upload build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/var/www/crm-frontend"
          strip_components: 2

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            nginx -t && systemctl reload nginx
            echo "✅ Frontend deploy tugadi"
