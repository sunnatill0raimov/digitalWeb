name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # 1. BACKEND DEPLOY
  # ─────────────────────────────────────────
  deploy-backend:
    name: 🚀 Backend Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e

            if [ ! -d "/var/www/digitalWeb/.git" ]; then
              git clone https://github.com/sunnatill0raimov/digitalWeb.git /var/www/digitalWeb
            fi

            cd /var/www/digitalWeb

            # Eski .env ni saqlash (overwrite qilmaymiz)
            if [ -f backend/.env ]; then
              cp backend/.env /tmp/backend_env_backup
            fi

            git fetch origin main
            git reset --hard origin/main

            # .env ni qaytarish
            if [ -f /tmp/backend_env_backup ]; then
              cp /tmp/backend_env_backup backend/.env
              echo "✅ .env saqlangan versiyadan tiklandi"
            fi

            cd backend
            npm ci --omit=dev

            pm2 restart crm-backend || pm2 start src/server.js --name crm-backend
            pm2 save

            echo "✅ Backend deploy tugadi"

  # ─────────────────────────────────────────
  # 2. FRONTEND BUILD + DEPLOY
  # ─────────────────────────────────────────
  deploy-frontend:
    name: 🎨 Frontend Deploy
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Upload build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/var/www/crm-frontend"
          strip_components: 2

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            nginx -t && systemctl reload nginx
            echo "✅ Frontend deploy tugadi"
