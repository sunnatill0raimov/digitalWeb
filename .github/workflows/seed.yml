name: Seed Database

on:
  workflow_dispatch:

jobs:
  seed:
    name: 🌱 Database seed
    runs-on: ubuntu-latest
    steps:
      - name: Run seed via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /var/www/digitalWeb/backend
            node src/config/seed.js
